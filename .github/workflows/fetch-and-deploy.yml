name: Fetch News & Deploy

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (1 region, 3 articles)'
        required: false
        default: false
        type: boolean

concurrency:
  group: fetch-and-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  # ───────────────────────────────────────────────────────
  # Parallel region groups — each runs full pipeline and
  # pushes directly to Supabase. No fan-in needed.
  # ───────────────────────────────────────────────────────
  fetch-regions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        batch:
          - name: batch-1
            regions: "iran,russia,israel"
          - name: batch-2
            regions: "gulf,proxies,middle_east"
          - name: batch-3
            regions: "china,turkey,south_asia,western"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: scripts/.venv
          key: poetry-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Python dependencies
        working-directory: scripts
        run: poetry install --no-interaction --no-root

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Playwright Chromium
        working-directory: scripts
        run: poetry run python -m playwright install chromium --with-deps

      - name: "Run pipeline: ${{ matrix.batch.name }} (${{ matrix.batch.regions }})"
        working-directory: scripts
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TEST_MODE: ${{ inputs.test_mode || 'false' }}
          LLM_CONCURRENCY: "8"
          LLM_CLASSIFY_CONCURRENCY: "5"
          PIPELINE_REGIONS: ${{ matrix.batch.regions }}
        run: poetry run python run_pipeline.py --steps fetch,translate,classify,geocode,threat

  # ───────────────────────────────────────────────────────
  # Re-trigger: chain the next pipeline run after all
  # region batches complete.
  # ───────────────────────────────────────────────────────
  retrigger:
    needs: fetch-regions
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for gh CLI)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Wait and re-trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting 90 seconds before re-triggering…"
          sleep 90
          gh workflow run fetch-and-deploy.yml --ref "main"
