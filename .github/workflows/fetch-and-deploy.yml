name: Fetch News & Deploy

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (1 region, 3 articles)'
        required: false
        default: false
        type: boolean

concurrency:
  group: fetch-and-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────
  # Single job — all regions share one LLM server (DGX)
  # ───────────────────────────────────────────────────────
  fetch-all:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: scripts/.venv
          key: poetry-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Python dependencies
        working-directory: scripts
        run: poetry install --no-interaction --no-root

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Playwright Chromium
        working-directory: scripts
        run: poetry run python -m playwright install chromium --with-deps

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify LLM endpoint reachability
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          # Show redacted URL (host only, no path/key)
          echo "LLM endpoint host: $(echo "$LLM_API_URL" | sed 's|://\(.*\)/.*|://\1/...|')"
          # Test connectivity
          HTTP_CODE=$(curl -s -o /tmp/llm_response.txt -w '%{http_code}' \
            -H "Authorization: Bearer $LLM_API_KEY" \
            -H "Content-Type: application/json" \
            "$(echo "$LLM_API_URL" | sed 's|/chat/completions|/models|')" \
            --connect-timeout 10 --max-time 15 || echo "000")
          echo "HTTP status: $HTTP_CODE"
          echo "Response (first 500 chars):"
          head -c 500 /tmp/llm_response.txt
          echo ""
          if echo "$(cat /tmp/llm_response.txt)" | grep -q "base_resp"; then
            echo "::error::Response contains 'base_resp' — this is a MiniMax endpoint, NOT llama.cpp!"
          fi

      - name: "Run pipeline: all regions"
        working-directory: scripts
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TEST_MODE: ${{ inputs.test_mode || 'false' }}
          LLM_CONCURRENCY: "4"
          LLM_CLASSIFY_CONCURRENCY: "3"
        run: poetry run python run_pipeline.py --steps fetch,translate,classify,geocode,threat

