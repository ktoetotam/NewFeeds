name: "Test — Supabase Pipeline"

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (1 region, 3 articles)"
        required: false
        default: true
        type: boolean

concurrency:
  group: test-supabase
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: scripts/.venv
          key: poetry-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Python dependencies
        working-directory: scripts
        run: poetry install --no-interaction --no-root

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('scripts/poetry.lock') }}

      - name: Install Playwright Chromium
        working-directory: scripts
        run: poetry run python -m playwright install chromium --with-deps

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Run news pipeline
        working-directory: scripts
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TEST_MODE: ${{ inputs.test_mode == false && 'false' || 'true' }}
          LLM_CONCURRENCY: "8"
        run: poetry run python run_pipeline.py --steps fetch,translate,classify,geocode,threat

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install Node dependencies
        working-directory: site
        run: npm ci

      - name: Build static site (verify)
        working-directory: site
        env:
          NEXT_PUBLIC_BASE_PATH: /NewFeeds
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build
